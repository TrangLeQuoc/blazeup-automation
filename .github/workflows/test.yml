name: BlazeUp Automation Tests

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
#   manual (workflow_dispatch) → Jenkins-style "Build with Parameters":
#                                pick mode + specific TC IDs. Works from the
#                                GitHub Mobile app: Actions → this workflow → Run.
#
#   NOTE: runs are started by hand only — neither push nor a schedule triggers CI.
#
# Single merged `blazeup` domain (SA + partner share one API gateway). Mirrors
# how you run locally:
#   python -m runner.blazeup.run_test --mode smoke
#   python -m runner.blazeup.run_test --execute 2061001 2061002
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Test mode (ignored when 'Test case IDs' is filled in)"
        type: choice
        default: smoke
        options:
          - normal
          - smoke
          - regression
      execute:
        description: "Specific TC IDs, space-separated (e.g. 2061001 2061002). Leave blank to use mode."
        type: string
        default: ""
      excel:
        description: "Export Excel report"
        type: boolean
        default: true
      ai_triage:
        description: "Run AI failure triage (writes ai_triage.md when tests fail)"
        type: boolean
        default: true

# Opt JS-based actions into the Node.js 24 runtime (silences the deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps

      - name: Validate registry is up-to-date
        run: |
          python utils/sync_registry.py
          git diff --exit-code runner/blazeup/registry.py runner/blazeup/registry_modules/ || \
            (echo "::error::The TC registry is out of sync. Run 'python utils/sync_registry.py' and commit." && exit 1)

      # ── Load URLs + credentials from secrets into the environment ──────────
      # settings.py reads these directly (no .env needed on CI). Secret values
      # written to $GITHUB_ENV stay masked in logs. The API gateway is shared;
      # only the UI origin + credentials differ per actor (admin vs partner).
      - name: Map secrets to env
        run: |
          {
            echo "API_BASE_URL=${{ secrets.API_BASE_URL }}"
            echo "ADMIN_BASE_URL=${{ secrets.ADMIN_BASE_URL }}"
            echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}"
            echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"
            echo "PARTNER_BASE_URL=${{ secrets.PARTNER_BASE_URL }}"
            echo "PARTNER_EMAIL=${{ secrets.PARTNER_EMAIL }}"
            echo "PARTNER_PASSWORD=${{ secrets.PARTNER_PASSWORD }}"
          } >> "$GITHUB_ENV"

      # ── Run via the merged runner — same entry point you use locally ───────
      # `--execute` (when given) wins over `--mode`. Excel + AI triage follow the
      # runner's REPORT_* defaults; the checkboxes can force either off. The
      # runner writes ai_triage.md itself on failure (provider/model below).
      - name: Run tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AI_PROVIDER: groq
          AI_MODEL: llama-3.1-8b-instant
          HEADLESS: "true"
          MODE: ${{ inputs.mode }}
          EXECUTE: ${{ inputs.execute }}
          EXCEL: ${{ inputs.excel }}
          AITRIAGE: ${{ inputs.ai_triage }}
        run: |
          set +e
          EXCEL_FLAG=""
          [ "$EXCEL" = "false" ] && EXCEL_FLAG="--no-excel-report"
          AI_FLAG=""
          [ "$AITRIAGE" = "false" ] && AI_FLAG="--no-ai-triage"
          if [ -n "$EXECUTE" ]; then
            python -m runner.blazeup.run_test --mode "$MODE" --execute $EXECUTE $EXCEL_FLAG $AI_FLAG
          else
            python -m runner.blazeup.run_test --mode "$MODE" $EXCEL_FLAG $AI_FLAG
          fi
          ec=$?
          set -e
          # Runner exit 5 = "no TC matched the filters" — not a failure.
          if [ "$ec" -eq 5 ]; then
            echo "::warning::No test cases matched (mode='$MODE', execute='$EXECUTE') — nothing to run."
            ec=0
          fi
          RUN_DIR=$(ls -dt results/run_* 2>/dev/null | head -1)
          echo "RUN_DIR=$RUN_DIR"   >> "$GITHUB_ENV"
          echo "PYTEST_EXIT=$ec"    >> "$GITHUB_ENV"

      - name: Publish links + AI triage to job summary
        if: always()
        run: |
          {
            echo "### 📊 Allure dashboard"
            echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/blazeup/"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$RUN_DIR" ] && [ -f "$RUN_DIR/ai_triage.md" ]; then
            {
              echo ""
              echo "## AI Failure Triage"
              echo ""
              cat "$RUN_DIR/ai_triage.md"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── Telegram notification: pass or fail. On failure, attaches the AI
      # triage markdown. Skips silently if no bot token / chat id. Never fails.
      - name: Notify via Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Legacy per-domain secret — used as a fallback so existing setups keep
          # working without re-creating the plain TELEGRAM_CHAT_ID secret.
          TELEGRAM_CHAT_ID_BLAZEUP_ADMIN: ${{ secrets.TELEGRAM_CHAT_ID_BLAZEUP_ADMIN }}
          MODE: ${{ inputs.mode }}
          EXECUTE: ${{ inputs.execute }}
          REPO_NAME: ${{ github.event.repository.name }}
          OWNER: ${{ github.repository_owner }}
          RUN_NUM: ${{ github.run_number }}
        run: |
          # Prefer the dedicated admin group; fall back to the shared/common group
          # (TELEGRAM_CHAT_ID) if the admin one isn't set.
          CHAT_ID="${TELEGRAM_CHAT_ID_BLAZEUP_ADMIN:-$TELEGRAM_CHAT_ID}"
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "::warning::No Telegram bot token / chat id — skipping notice."
            exit 0
          fi
          API="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}"
          if [ "${PYTEST_EXIT:-0}" -eq 0 ]; then ICON="✅"; STATUS="PASSED"; else ICON="❌"; STATUS="FAILED"; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DASH_URL="https://${OWNER}.github.io/${REPO_NAME}/blazeup/"
          SEL="mode=${MODE}"
          [ -n "$EXECUTE" ] && SEL="execute=${EXECUTE}"
          MSG=$(printf '%s <b>Job run #%s</b>\n\n<b>BlazeUp CI</b>\nResult: <b>%s</b>\nSelection: <code>%s</code>\n\n🔗 <a href="%s">View run</a>   📊 <a href="%s">Dashboard</a>' \
            "$ICON" "$RUN_NUM" "$STATUS" "$SEL" "$RUN_URL" "$DASH_URL")
          curl -s -X POST "${API}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode=HTML \
            -d disable_web_page_preview=true \
            --data-urlencode "text=${MSG}" >/dev/null \
            || echo "::warning::Telegram sendMessage failed (non-blocking)."
          TRIAGE=""
          if [ -n "$RUN_DIR" ] && [ -f "$RUN_DIR/ai_triage.md" ]; then
            TRIAGE="$RUN_DIR/ai_triage.md"
          else
            TRIAGE=$(ls -t results/run_*/ai_triage.md 2>/dev/null | head -1)
          fi
          if [ "${PYTEST_EXIT:-0}" -ne 0 ] && [ -n "$TRIAGE" ] && [ -f "$TRIAGE" ]; then
            HTTP=$(curl -s -o /tmp/tg_doc.json -w '%{http_code}' -X POST "${API}/sendDocument" \
              -F chat_id="${CHAT_ID}" \
              -F caption="🔍 AI triage (run #${RUN_NUM})" \
              -F document=@"$TRIAGE")
            if [ "$HTTP" != "200" ]; then
              echo "::warning::Telegram sendDocument HTTP $HTTP — $(cat /tmp/tg_doc.json 2>/dev/null)"
            fi
          fi

      - name: Upload reports & logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            results
            allure-results
            reports

      - name: Fail job if tests failed
        if: always()
        run: |
          if [ "${PYTEST_EXIT:-0}" -ne 0 ]; then
            echo "::error::Tests failed (runner exit code ${PYTEST_EXIT})."
            exit "${PYTEST_EXIT}"
          fi
          echo "All selected tests passed (or none matched)."

  # ── Trend dashboard: publish Allure report (with history) to GitHub Pages ──
  # Runs after `tests` regardless of pass/fail (we WANT failures in the trend).
  #   https://<owner>.github.io/<repo>/blazeup/
  publish-report:
    needs: tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: test-artifacts
          path: dl

      - name: Locate allure-results
        id: loc
        run: |
          AR=$(ls -dt dl/results/run_*/allure-results 2>/dev/null | head -1)
          if [ -z "$AR" ] || [ -z "$(ls -A "$AR" 2>/dev/null)" ]; then
            echo "::warning::No allure-results — nothing to publish."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            cp -r "$AR" allure-results
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout existing gh-pages (for history)
        if: steps.loc.outputs.found == 'true'
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report (with history/trend)
        if: steps.loc.outputs.found == 'true'
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_history: allure-history
          subfolder: blazeup
          keep_reports: 30

      - name: Deploy to gh-pages
        if: steps.loc.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          rm -rf pages
          if git ls-remote --exit-code --heads "$REPO" gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages --single-branch "$REPO" pages
          else
            mkdir pages
            git -C pages init -q
            git -C pages checkout -q --orphan gh-pages
          fi
          cp -r allure-history/. pages/
          git -C pages config user.name  "github-actions[bot]"
          git -C pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C pages add -A
          git -C pages commit -m "Allure report (run ${{ github.run_number }})" --allow-empty
          git -C pages push "$REPO" HEAD:gh-pages
