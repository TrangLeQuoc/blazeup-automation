name: BlazeUp Automation Tests

on:
  push:
    branches: ["main", "master", "develop"]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  smoke:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps

      - name: Validate registries are up-to-date
        run: |
          python utils/sync_registry.py
          git diff --exit-code runner/*/registry.py || \
            (echo "::error::A runner/{domain}/registry.py is out of sync. Run 'python utils/sync_registry.py' and commit." && exit 1)

      - name: Run smoke tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          HEADLESS: "true"
        run: |
          pytest -m smoke -n auto --tb=short -q --junitxml=reports/junit-smoke.xml || ec=$?
          # pytest exit code 5 = "no tests collected" — not a failure while the
          # smoke suite is still empty. Any other non-zero code is a real failure.
          if [ "${ec:-0}" -eq 5 ]; then
            echo "::warning::No smoke-marked tests collected — nothing to run yet."
            exit 0
          fi
          exit "${ec:-0}"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-reports
          path: |
            reports
            allure-results

  regression:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps

      - name: Validate registries are up-to-date
        run: |
          python utils/sync_registry.py
          git diff --exit-code runner/*/registry.py || \
            (echo "::error::A runner/{domain}/registry.py is out of sync. Run 'python utils/sync_registry.py' and commit." && exit 1)

      - name: Run full regression
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          HEADLESS: "true"
        run: |
          pytest -m regression -n auto --tb=short -q --junitxml=reports/junit-regression.xml || ec=$?
          # pytest exit code 5 = "no tests collected" — not a failure while the
          # regression suite is still empty. Any other non-zero code is a real failure.
          if [ "${ec:-0}" -eq 5 ]; then
            echo "::warning::No regression-marked tests collected — nothing to run yet."
            exit 0
          fi
          exit "${ec:-0}"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports
          path: |
            reports
            allure-results
