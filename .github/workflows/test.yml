name: BlazeUp Automation Tests

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
#   manual (workflow_dispatch) → Jenkins-style "Build with Parameters":
#                                you pick domain + mode + specific TC IDs.
#                                Works from the GitHub Mobile app:
#                                Actions tab → this workflow → "Run workflow".
#   schedule                   → full regression, all domains (nightly 02:00 UTC).
#
#   NOTE: push does NOT trigger CI on purpose — runs are started by hand with
#   the parameters you choose (or by the nightly schedule).
#
# This mirrors how you run locally:
#   python -m runner.blazeup_admin.run_test --mode smoke
#   python -m runner.blazeup_admin.run_test --execute 12010101 12010102
#
# Multi-domain: the `tests` job runs once PER domain via a matrix. Picking
# domain=all fans out into parallel jobs (one per domain), each loading that
# domain's own BASE_URL + credentials from per-domain secrets.
# ─────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      domain:
        description: "Which domain to test"
        type: choice
        default: blazeup_admin
        options:
          - blazeup_admin
          - blazeup_partner
          - all
      mode:
        description: "Test mode (ignored when 'Test case IDs' is filled in)"
        type: choice
        default: smoke
        options:
          - normal
          - smoke
          - regression
      execute:
        description: "Specific TC IDs, space-separated (e.g. 12010101 12010102). Leave blank to use mode."
        type: string
        default: ""
      excel:
        description: "Export Excel report (only effective for domains where it's supported, e.g. blazeup_admin)"
        type: boolean
        default: true

# Opt the JavaScript-based actions (checkout / setup-python / cache /
# upload-artifact) into the Node.js 24 runtime now, silencing the
# "Node.js 20 actions are deprecated" warning ahead of the June 2026 cutoff.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Decide what to run, then hand the matrix to the `tests` job ────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      domains: ${{ steps.cfg.outputs.domains }}
      mode: ${{ steps.cfg.outputs.mode }}
      execute: ${{ steps.cfg.outputs.execute }}
      excel: ${{ steps.cfg.outputs.excel }}
    steps:
      - name: Resolve domain matrix + params
        id: cfg
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "schedule" ]; then
            # Nightly: full regression across every domain, no TC filter, Excel on.
            DOMAIN=all;  MODE=regression;  EXECUTE="";  EXCEL=true
          else
            DOMAIN="${{ inputs.domain }}";  MODE="${{ inputs.mode }}";  EXECUTE="${{ inputs.execute }}";  EXCEL="${{ inputs.excel }}"
          fi

          # domain=all fans out into one matrix entry per domain.
          case "$DOMAIN" in
            all) DOMAINS='["blazeup_admin","blazeup_partner"]' ;;
            *)   DOMAINS="[\"$DOMAIN\"]" ;;
          esac

          echo "domains=$DOMAINS" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE"       >> "$GITHUB_OUTPUT"
          echo "execute=$EXECUTE" >> "$GITHUB_OUTPUT"
          echo "excel=$EXCEL"     >> "$GITHUB_OUTPUT"
          echo "::notice::domains=$DOMAINS mode='$MODE' execute='$EXECUTE' excel='$EXCEL'"

  tests:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one domain failing must not cancel the others
      matrix:
        domain: ${{ fromJSON(needs.setup.outputs.domains) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps

      - name: Validate registries are up-to-date
        run: |
          python utils/sync_registry.py
          git diff --exit-code runner/*/registry.py || \
            (echo "::error::A runner/{domain}/registry.py is out of sync. Run 'python utils/sync_registry.py' and commit." && exit 1)

      # ── Load THIS domain's URL + credentials from per-domain secrets ───────
      # Secret values written to $GITHUB_ENV stay masked in logs. settings.py
      # reads them from the environment (no per-domain .env needed on CI).
      - name: Map domain secrets
        run: |
          case "${{ matrix.domain }}" in
            blazeup_admin)
              echo "BASE_URL=${{ secrets.ADMIN_BASE_URL }}"            >> "$GITHUB_ENV"
              echo "API_BASE_URL=${{ secrets.ADMIN_API_BASE_URL }}"    >> "$GITHUB_ENV"
              echo "TEST_EMAIL=${{ secrets.ADMIN_TEST_EMAIL }}"        >> "$GITHUB_ENV"
              echo "TEST_PASSWORD=${{ secrets.ADMIN_TEST_PASSWORD }}"  >> "$GITHUB_ENV"
              ;;
            blazeup_partner)
              echo "BASE_URL=${{ secrets.PARTNER_BASE_URL }}"            >> "$GITHUB_ENV"
              echo "API_BASE_URL=${{ secrets.PARTNER_API_BASE_URL }}"    >> "$GITHUB_ENV"
              echo "TEST_EMAIL=${{ secrets.PARTNER_TEST_EMAIL }}"        >> "$GITHUB_ENV"
              echo "TEST_PASSWORD=${{ secrets.PARTNER_TEST_PASSWORD }}"  >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Unknown domain '${{ matrix.domain }}' — no secrets mapped."
              exit 1
              ;;
          esac

      # ── Run via the per-domain runner — same entry point you use locally ───
      # `--execute` (when given) wins over `--mode` inside the runner, exactly
      # like the CLI. Excel export follows each domain's REPORT_EXCEL default
      # (admin=True, partner=False); the workbook is written into the run dir
      # and ships inside the uploaded `results` artifact.
      - name: Run tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HEADLESS: "true"
          BLAZEUP_DOMAIN: ${{ matrix.domain }}
          MODE: ${{ needs.setup.outputs.mode }}
          EXECUTE: ${{ needs.setup.outputs.execute }}
          EXCEL: ${{ needs.setup.outputs.excel }}
        run: |
          set +e
          # Excel checkbox: unchecked (false) → force-skip with --no-excel-report.
          # checked (true) → pass nothing, so each domain's REPORT_EXCEL default
          # applies (admin=on, partner=off).
          EXCEL_FLAG=""
          if [ "$EXCEL" = "false" ]; then
            EXCEL_FLAG="--no-excel-report"
          fi
          if [ -n "$EXECUTE" ]; then
            python -m runner.${{ matrix.domain }}.run_test --mode "$MODE" --execute $EXECUTE $EXCEL_FLAG
          else
            python -m runner.${{ matrix.domain }}.run_test --mode "$MODE" $EXCEL_FLAG
          fi
          ec=$?
          set -e
          # Runner exit 5 = "no TC matched the filters" — not a failure (a domain
          # or suite may still be empty). Any other non-zero is a real failure.
          if [ "$ec" -eq 5 ]; then
            echo "::warning::No test cases matched for ${{ matrix.domain }} (mode='$MODE', execute='$EXECUTE') — nothing to run yet."
            ec=0
          fi
          # The runner writes to results/run_<timestamp>/. Capture the newest dir
          # so AI triage + artifact upload point at the right run.
          RUN_DIR=$(ls -dt results/run_* 2>/dev/null | head -1)
          echo "RUN_DIR=$RUN_DIR"   >> "$GITHUB_ENV"
          # Remember the result but DON'T fail here, so artifact upload (and
          # AI triage) still run on failure.
          echo "PYTEST_EXIT=$ec"    >> "$GITHUB_ENV"

      # ── AI failure triage: only when something actually failed ─────────────
      # Reads $RUN_DIR/logs/test.log, classifies WHY each test failed, and
      # writes $RUN_DIR/ai_triage.md (bundled into the artifact below) plus a
      # copy on the run's Summary page. Non-blocking: never fails the job.
      # --provider/--model are explicit because CI has no per-domain .env.
      - name: AI failure triage
        if: ${{ env.PYTEST_EXIT != '0' && env.PYTEST_EXIT != '' }}
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$RUN_DIR" ]; then
            echo "::warning::No run dir found — skipping AI triage."
            exit 0
          fi
          python -m utils.ai_triage "$RUN_DIR" \
            --provider groq --model llama-3.1-8b-instant \
            || echo "::warning::AI triage step failed (non-blocking)."
          if [ -f "$RUN_DIR/ai_triage.md" ]; then
            {
              echo "## AI Failure Triage — ${{ matrix.domain }}"
              echo ""
              cat "$RUN_DIR/ai_triage.md"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── Telegram notification: one message per domain, pass or fail ────────
      # Sends a short summary + links to the run and the dashboard. On failure,
      # also uploads the AI triage markdown as a document. Skips silently if the
      # TELEGRAM_* secrets aren't configured. Never fails the job.
      - name: Notify via Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOMAIN: ${{ matrix.domain }}
          MODE: ${{ needs.setup.outputs.mode }}
          EXECUTE: ${{ needs.setup.outputs.execute }}
          REPO_NAME: ${{ github.event.repository.name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID not set — skipping Telegram notice."
            exit 0
          fi
          API="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}"
          if [ "${PYTEST_EXIT:-0}" -eq 0 ]; then STATUS="✅ PASSED"; else STATUS="❌ FAILED"; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DASH_URL="https://${OWNER}.github.io/${REPO_NAME}/${DOMAIN}/"
          SEL="mode=${MODE}"
          [ -n "$EXECUTE" ] && SEL="execute=${EXECUTE}"
          # Build with REAL newlines; --data-urlencode encodes them to %0A for us.
          MSG=$(printf '<b>BlazeUp CI — %s</b>\n%s  (%s)\n\n<a href="%s">View run</a>  |  <a href="%s">Dashboard</a>' \
            "$DOMAIN" "$STATUS" "$SEL" "$RUN_URL" "$DASH_URL")
          curl -s -X POST "${API}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            -d disable_web_page_preview=true \
            --data-urlencode "text=${MSG}" >/dev/null \
            || echo "::warning::Telegram sendMessage failed (non-blocking)."
          # On failure, attach the AI triage report if it exists.
          if [ "${PYTEST_EXIT:-0}" -ne 0 ] && [ -n "$RUN_DIR" ] && [ -f "$RUN_DIR/ai_triage.md" ]; then
            curl -s -X POST "${API}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F caption="AI triage — ${DOMAIN}" \
              -F document=@"$RUN_DIR/ai_triage.md" >/dev/null \
              || echo "::warning::Telegram sendDocument failed (non-blocking)."
          fi

      - name: Upload reports & logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ matrix.domain }}
          path: |
            results
            allure-results
            reports

      - name: Fail job if tests failed
        if: always()
        run: |
          if [ "${PYTEST_EXIT:-0}" -ne 0 ]; then
            echo "::error::Tests failed for ${{ matrix.domain }} (runner exit code ${PYTEST_EXIT})."
            exit "${PYTEST_EXIT}"
          fi
          echo "All selected tests passed (or none matched) for ${{ matrix.domain }}."

  # ── Trend dashboard: publish Allure report (with history) to GitHub Pages ──
  # Runs after `tests` regardless of pass/fail (we WANT failures in the trend).
  # One matrix entry per domain → its own subfolder + its own history line, so
  # the dashboards never overwrite each other:
  #   https://<owner>.github.io/<repo>/blazeup_admin/
  #   https://<owner>.github.io/<repo>/blazeup_partner/
  publish-report:
    needs: [setup, tests]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write          # push the generated report to the gh-pages branch
    # Serialize gh-pages pushes so the parallel domains don't race each other.
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 1          # one domain deploys at a time (no push race)
      matrix:
        domain: ${{ fromJSON(needs.setup.outputs.domains) }}
    steps:
      - name: Download this domain's artifact
        uses: actions/download-artifact@v4
        with:
          name: test-artifacts-${{ matrix.domain }}
          path: dl

      # The runner writes allure-results inside results/run_<timestamp>/.
      # Lift the newest one to a stable path the report action expects.
      - name: Locate allure-results
        id: loc
        run: |
          AR=$(ls -dt dl/results/run_*/allure-results 2>/dev/null | head -1)
          if [ -z "$AR" ] || [ -z "$(ls -A "$AR" 2>/dev/null)" ]; then
            echo "::warning::No allure-results for ${{ matrix.domain }} — nothing to publish."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            cp -r "$AR" allure-results
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      # Pull the previous report (history lives here) so Allure can draw trends.
      # First ever run has no gh-pages branch yet → don't fail.
      - name: Checkout existing gh-pages (for history)
        if: steps.loc.outputs.found == 'true'
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report (with history/trend)
        if: steps.loc.outputs.found == 'true'
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_history: allure-history
          subfolder: ${{ matrix.domain }}
          keep_reports: 30       # how many past runs to keep in the trend

      # Explicit git deploy — handles the FIRST run (create orphan gh-pages) and
      # later runs (clone existing branch first, so the OTHER domain's subfolder
      # is preserved). --allow-empty guarantees a ref exists to push.
      - name: Deploy to gh-pages
        if: steps.loc.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          rm -rf pages
          if git ls-remote --exit-code --heads "$REPO" gh-pages >/dev/null 2>&1; then
            # Branch exists → clone it so we keep the other domain's subfolder.
            git clone --branch gh-pages --single-branch "$REPO" pages
          else
            # First ever deploy → start a fresh orphan branch.
            mkdir pages
            git -C pages init -q
            git -C pages checkout -q --orphan gh-pages
          fi
          # Overlay this run's report. Only this domain's subfolder (+ the shared
          # index.html redirect) is touched; the other domain's folder stays.
          cp -r allure-history/. pages/
          git -C pages config user.name  "github-actions[bot]"
          git -C pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C pages add -A
          git -C pages commit -m "Allure report: ${{ matrix.domain }} (run ${{ github.run_number }})" --allow-empty
          git -C pages push "$REPO" HEAD:gh-pages
