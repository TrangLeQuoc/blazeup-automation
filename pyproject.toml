# ── Tooling config (lint + format) ────────────────────────────────────────────
# Ruff is both the linter and the formatter for this project.
#   ruff check .          # lint
#   ruff check . --fix    # lint + autofix safe issues
#   ruff format .         # format (Black-compatible)
# These also run automatically on commit via .pre-commit-config.yaml.

[tool.ruff]
target-version = "py313"
line-length = 100
# Generated / vendored code that shouldn't be linted or reformatted.
extend-exclude = [
    "runner/*/registry.py",   # auto-generated by utils/sync_registry.py
    "results",
    "reports",
    "allure-results",
]

[tool.ruff.lint]
# A pragmatic starter set — expand later as the codebase matures.
#   E/W  pycodestyle    F  pyflakes      I  isort (import order)
#   UP   pyupgrade      B  bugbear       C4 comprehensions    SIM simplify
select = ["E", "W", "F", "I", "UP", "B", "C4", "SIM"]
ignore = [
    "E501",   # line length is handled by the formatter, not the linter
    "B008",   # function calls in arg defaults (common with Field(...)/Depends())
]

[tool.ruff.lint.per-file-ignores]
# Test files and conftest may use star-imports / unused fixtures.
"tests/**" = ["F401", "F811"]
"conftest.py" = ["F401"]
"**/__init__.py" = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
