# SA domain configuration
tc_prefix: "SA"

# --- TC ID numbering (read by utils/sync_registry.py) -----------------------
# project_number  : the leading PROJECT digit in every TC ID for this domain.
# modules.<NAME>  : number  = the module's 2-digit slot,
#                   ui:/api: = feature->number maps (the section slot).
#   TC ID = {type}{project_number}{module.number:02d}{section:02d}{seq:02d}
#   type 1=UI / 0=API.  The project digit keeps IDs unique across projects
#   even when two domains reuse the same module name (e.g. "PARTNERS").
project_number: 2

modules:
  # Shell = cross-page / global features (page loads, load time).
  SHELL:
    number: 1
    ui:
      LOAD_TIME_PAGE: 1
      PAGE_LOADS: 2
  # SA Dashboard nav pages — each page is its own module, per the convention
  # PAGE_UI_FEATURE_NNN (e.g. DASHBOARD_UI_VISIBLE_001). Feature "VISIBLE" = the
  # page's key widgets render; add more features per page as you build them.
  DASHBOARD:
    number: 2
    ui: {VISIBLE: 1}
  # Pages below only reserve their module `number` (ID slot + inventory).
  # No test yet → no section declared. Add a `ui:`/`api:` section the moment you
  # write a test for that page, e.g.  TENANTS:\n    number: 3\n    ui: {VISIBLE: 1}
  TENANTS:
    number: 3
  BILLING:
    number: 4
  PLANS:
    number: 5
  # PARTNER — SA-side partner management. This IS the SA Dashboard "Partners" area:
  # the management UI (SA Partner Module screens) + the sa-partners-api backend.
  # Matches the Partner Platform test plan prefix PARTNER_*. Partner-PORTAL features
  # (My Pipeline, partner dashboard, ...) belong to the blazeup_partner domain.
  PARTNER:
    number: 6        # reuses the old "PARTNERS" nav-page slot (same concept, merged)
    # ui: {...}      # add SA Partner Module UI sections when written
    api:
      # API grouped by backend FEATURE/resource (not by page):
      PARTNER_ACCOUNT_MANAGEMENT: 1
      DEAL_REGISTRATION_PIPELINE: 2
      # COMMISSIONS_PAYOUTS: 3
      # TERRITORIES: 4
      # CERTIFICATIONS: 5
      # AUDIT_LOG: 6
  MARKETPLACE:
    number: 7
  AUDIT_LOG:
    number: 8
  CONNECTORS:
    number: 9
  PLATFORM_TEMPLATES:
    number: 10
  MARKETING_LIBRARY:
    number: 11
  EXPENSE_LIBRARY:
    number: 12
  HELP_PLATFORM:
    number: 13
  STATUTORY_REPORTS:
    number: 14
  COMPLIANCE:
    number: 15
  GOVERNANCE:
    number: 16

excel:
  file: SA_Test_Plan.xlsx
  sheet: "SA Platform"
  # module / excel_prefix: set these once the SA test plan sheet exists, e.g.
  #   module: <CODE_MODULE_NAME>
  #   excel_prefix: SA
  col_tc_string: 3
  col_auto_flag: 10
  col_auto_status: 11
  data_start_row: 13
