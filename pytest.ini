[pytest]
minversion = 8.0
addopts =
    -ra
    --strict-markers
    --html=reports/pytest-report.html
    --self-contained-html
    --alluredir=allure-results
asyncio_mode = auto
# Function-scoped async fixtures get a fresh loop per test; session-scoped ones
# (auth_state, api_token) opt into a session-lived loop via loop_scope="session".
# Set explicitly to silence pytest-asyncio's "unset default loop scope" warning.
asyncio_default_fixture_loop_scope = function
testpaths = tests
markers =
    smoke: critical smoke tests
    regression: full regression tests
    ui: browser-based UI tests
    api: HTTP API tests
    slow: slow or end-to-end tests
    be_gap: known backend gap, expected to fail until BE fixes it; exclude from the merge gate with -m "not be_gap"
filterwarnings =
    ignore::DeprecationWarning:pkg_resources.*
    ignore::pytest.PytestCacheWarning
